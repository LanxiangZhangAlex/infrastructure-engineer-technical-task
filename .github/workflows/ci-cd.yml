name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: application/package-lock.json
      - run: npm ci
        working-directory: application
      - run: npm run build
        working-directory: application
      - run: docker build -t infrastructure-portfolio:${{ github.sha }} application

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-infrastructure/package-lock.json
      - run: npm ci
        working-directory: my-infrastructure
      - run: npm run build
        working-directory: my-infrastructure
      - run: npm test -- --runInBand
        working-directory: my-infrastructure
